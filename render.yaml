services:
  - type: web
    name: marketing-os-api
    env: node
    plan: free
    rootDir: .
    buildCommand: npm run build --workspace=api
    startCommand: node apps/api/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        value: https://marketing-os-eight-virid.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        value: marketing-os-webhook-token
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
